<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MiRaR - المنصة التعليمية الذكية</title>
    <link rel="icon" type="image/png" href="assets/images/logo-icon.png">
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
</head>

<body>
    <div class="background-elements">
        <div class="bg-blob blob-1"></div>
        <div class="bg-blob blob-2"></div>
        <div class="bg-blob blob-3"></div>
    </div>

    <nav class="navbar glass">
        <div class="container nav-content">
            <div class="nav-right">
                <a href="#" data-route="home" class="brand">
                    <img src="assets/images/logo-icon.png" alt="MiRaR Logo" class="brand-logo">
                    MiRaR<span>.</span>
                </a>
                <ul class="nav-links">
                    <li><a href="#" data-route="home" class="active glass-hover">الرئيسية</a></li>
                    <li><a href="#courses" data-route="courses" class="glass-hover">الكورسات</a></li>
                    <li><a href="#login" data-route="login" class="login-link glass-hover">تسجيل الدخول</a></li>
                </ul>
            </div>
            
            <div class="nav-logos">
                <img src="logo-damietta.jpg" alt="Damietta University" class="partner-logo">
                <img src="logo-education.jpg" alt="Ministry of Education" class="partner-logo">
                <img src="logo-techno.jpg" alt="Techno" class="partner-logo">
            </div>
        </div>
    </nav>

    <main id="app-root">
        <!-- Content will be injected here by JS -->
        <div class="loading-state fade-in">
            <div class="loader"></div>
            <div style="margin-top:20px; font-weight: 700; color: var(--primary); font-size: 1.2rem;">جاري تحميل
                المنصة...</div>
        </div>
    </main>

    <footer class="footer glass">
        <div class="container">
            <p>جميع الحقوق محفوظة &copy; 2026 MiRaR</p>
        </div>
    </footer>

    <script src="js/main.js" type="module"></script>
</body>

</html>
